# Templeton DNS — Phase 5 placeholder
#
# Full domain routing configured in Phase 5:
#   - templetoncounty.gov → proxy
#   - out-of-scope portfolio domains → proxy (bang trap)
#   - api.groq.com → passthrough
#   - everything else → NXDOMAIN
#
# Don't read the host's resolv.conf or /etc/hosts
no-resolv
no-hosts

# Groq passthrough (real internet)
server=/api.groq.com/8.8.8.8
server=/ollama.ai/8.8.8.8

# Phase 5: uncomment and replace <proxy_ip> with the proxy container's IP
# address=/templetoncounty.gov/<proxy_ip>
# address=/templetoncounty-services.gov/<proxy_ip>
# address=/sandiegocountyservices.com/<proxy_ip>
# address=/pelican-ridge-estates.com/<proxy_ip>

# NXDOMAIN for everything not explicitly listed (dnsmasq default with no-resolv)
