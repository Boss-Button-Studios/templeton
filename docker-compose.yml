version: "3.9"

services:
  web:
    build: ./web
    environment:
      TEMPLETON_SECRET: ${TEMPLETON_SECRET}
      TEMPLETON_TIER: ${TEMPLETON_TIER:-1}
    volumes:
      - ./shared:/shared:ro
      - ./web:/app:ro
    networks:
      internal_net:
        ipv4_address: 172.28.0.20
    restart: unless-stopped

  proxy:
    build: ./proxy
    environment:
      TEMPLETON_SECRET: ${TEMPLETON_SECRET}
      TEMPLETON_RUN_ID: ${TEMPLETON_RUN_ID}
      TEMPLETON_TIER_CONFIG: /web-config/tier1.yaml
    volumes:
      - ./shared:/shared:ro
      - ./proxy:/app:ro
      - ./web/config:/web-config:ro
      - proxy_data:/data
    ports:
      - "8080:8080"   # HTTP/HTTPS proxy for agent
      - "8081:8081"   # Monitor endpoint (live report stream)
    networks:
      internal_net:
        ipv4_address: 172.28.0.10
    extra_hosts:
      # Proxy must forward county traffic to the web container (172.28.0.20),
      # not to itself — the DNS container points agents at 172.28.0.10 (proxy),
      # but the proxy needs templetoncounty.gov to resolve to the web container.
      - "templetoncounty.gov:172.28.0.20"
      - "www.templetoncounty.gov:172.28.0.20"
    depends_on:
      - web
    restart: unless-stopped

  dns:
    build: ./dns
    networks:
      internal_net:
        ipv4_address: 172.28.0.53
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

networks:
  internal_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  proxy_data:
